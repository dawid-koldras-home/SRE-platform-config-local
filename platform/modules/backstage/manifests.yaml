---
# Source: backstage/templates/app-config-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-app-config
  namespace: "backstage"
data:
  app-config.yaml: |
    app:
      baseUrl: http://localhost:7007
      extensions:
      - page:catalog:
          config:
            path: /
      packages: all
      title: SRE Platform Developer Portal
    auth:
      environment: development
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true
          ownershipEntityRefs:
          - user:default/guest
          - group:default/platform-team
          userEntityRef: user:default/guest
    backend:
      actions:
        pluginSources:
        - auth
        - catalog
        - scaffolder
      baseUrl: http://localhost:7007
      cors:
        credentials: true
        methods:
        - GET
        - HEAD
        - PATCH
        - POST
        - PUT
        - DELETE
        origin: http://localhost:7007
      csp:
        connect-src:
        - '''self'''
        - 'http:'
        - 'https:'
      database:
        client: better-sqlite3
        connection: ':memory:'
      listen:
        port: 7007
    catalog:
      import:
        entityFilename: catalog-info.yaml
        pullRequestBranchName: backstage-integration
      locations:
      - target: /app/local-catalog.yaml
        type: file
      rules:
      - allow:
        - Component
        - System
        - API
        - Resource
        - Location
        - Template
        - User
        - Group
    mcpActions:
      description: Local developer portal for the SRE Platform
      name: SRE Platform Backstage
    organization:
      name: SRE Platform
    permission:
      enabled: true
    techdocs:
      builder: local
      generator:
        runIn: local
      publisher:
        type: local
---
# Source: backstage/templates/extra-list.yaml
apiVersion: v1
data:
  local-catalog.yaml: |
    apiVersion: backstage.io/v1alpha1
    kind: Group
    metadata:
      name: platform-team
      description: Local SRE Platform operators
    spec:
      type: team
      children: []
    ---
    apiVersion: backstage.io/v1alpha1
    kind: User
    metadata:
      name: guest
    spec:
      memberOf:
        - platform-team
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: sre-platform
      description: Customer SRE platform installed by srectl
    spec:
      owner: platform-team
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: sre-platform-control-plane
      description: Local SRE Platform control-plane services
      tags:
        - sre
        - gitops
    spec:
      type: service
      lifecycle: experimental
      owner: platform-team
      system: sre-platform
kind: ConfigMap
metadata:
  name: backstage-local-catalog
