---
# Source: backstage/templates/backstage-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: "backstage"
  labels: 
    app.kubernetes.io/name: backstage
    helm.sh/chart: backstage-2.8.2
    app.kubernetes.io/instance: backstage
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: backstage
  annotations:
spec:
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: backstage
      app.kubernetes.io/instance: backstage
      app.kubernetes.io/component: backstage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backstage
        helm.sh/chart: backstage-2.8.2
        app.kubernetes.io/instance: backstage
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: backstage
      annotations:
        checksum/app-config: 44136fa355b3678a1146ad16f7e8649e94fb4fc21fe77e8310c060f61caaff8a
    spec:
      serviceAccountName: default
      volumes:
      
      containers:
        - name: backstage-backend
          image: ghcr.io/backstage/backstage:1.52.1
          imagePullPolicy: ""
          command:
            - node
            - packages/backend
          args:
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /.backstage/health/v1/readiness
              port: 7007
              scheme: HTTP
          livenessProbe:
            httpGet:
              path: /.backstage/health/v1/liveness
              port: 7007
              scheme: HTTP
          startupProbe:
            httpGet:
              path: /.backstage/health/v1/liveness
              port: 7007
              scheme: HTTP
          env:
            - name: APP_CONFIG_backend_listen_port
              value: "7007"
          ports:
            - name: backend
              containerPort: 7007
              protocol: TCP
